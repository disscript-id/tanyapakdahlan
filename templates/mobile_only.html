<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanya untuk HP</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0d1017;
            color: #edf1f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 28px 24px;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 28px;
        }
        p {
            color: #b8c1cf;
            line-height: 1.7;
            font-size: 15px;
        }
        .note {
            margin-top: 16px;
            font-size: 13px;
            color: #8ab4f8;
        }
    </style>
</head>
<body>

    <div id="desktopBlockNotice" style="display:none; padding:14px 16px; text-align:center; background:rgba(255,99,99,0.12); color:#ffe2e2; font-size:13px; line-height:1.6; border-bottom:1px solid rgba(255,120,120,0.18);">
        Fitur peserta hanya bisa dibuka melalui HP.
    </div>
    <div class="card">
        <h1>Fitur ini hanya untuk HP</h1>
        <p>
            Halaman peserta Tanya Pak Dahlan saat ini hanya dapat dibuka melalui ponsel.
            Silakan lanjutkan dari browser di HP Anda.
        </p>
        <div class="note">
            Terimakasih.
        </div>
    </div>
</body>
</html>
